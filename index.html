<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <title>AutoPlay - Road Trip Games</title>
</head>
<body>

  <header>
    <div class="header-top">
      <span class="app-name">AutoPlay</span>
      <div class="header-actions">
        <button id="theme-btn" aria-label="Toggle dark mode">🌙</button>
        <button id="reset-btn" aria-label="Reset all plates">Reset</button>
      </div>
    </div>
    <div class="header-bottom">
      <h1>License Plate Tracker</h1>
      <div class="stats">
        <span id="counter">0 / 51</span>
        <span id="percent">0%</span>
      </div>
    </div>
  </header>

  <main id="grid"></main>

  <!-- Confirmation modal -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div id="modal">
      <h2 id="modal-title">Reset all plates?</h2>
      <p>This will uncheck all 51 plates. This cannot be undone.</p>
      <div class="modal-actions">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-confirm">Yes, reset</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="Games">
    <button class="nav-tab active" aria-current="page" aria-label="License Plates">
      <img src="IN.svg" alt="" aria-hidden="true" class="nav-icon">
      <span>License Plates</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>

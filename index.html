<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#16213e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <title>AutoPlay - Road Trip Games</title>
</head>
<body>

  <header>
    <div class="header-left">
      <span class="app-name">AutoPlay</span>
      <h1>50 States Tracker</h1>
      <span id="counter">0 / 50</span>
    </div>
    <button id="reset-btn" aria-label="Reset all states">Reset</button>
  </header>

  <main id="grid"></main>

  <!-- Confirmation modal -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div id="modal">
      <h2 id="modal-title">Reset all states?</h2>
      <p>This will uncheck all 50 states. This cannot be undone.</p>
      <div class="modal-actions">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-confirm">Yes, reset</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
